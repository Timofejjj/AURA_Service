            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                example1:
                  value:
                    user_id: 1
                    username: "john_doe"
                    access_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1aWQiOjEsInR5cGUiOiJhY2Nlc3MiLCJleHAiOjE2OTk5OTk5OTksImlhdCI6MTY5OTk5OTAwMH0..."
                    refresh_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1aWQiOjEsInR5cGUiOiJyZWZyZXNoIiwiZXhwIjoxNjk5OTk5OTk5LCJpYXQiOjE2OTk5OTkwMDB9..."
        '401':
