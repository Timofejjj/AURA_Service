      summary: Р’С‹С…РѕРґ РёР· СЃРёСЃС‚РµРјС‹
      description: |
        РћС‚Р·С‹РІР°РµС‚ refresh С‚РѕРєРµРЅ, РґРµР»Р°СЏ РµРіРѕ РЅРµРґРµР№СЃС‚РІРёС‚РµР»СЊРЅС‹Рј.
        РџРѕСЃР»Рµ logout РЅРµРѕР±С…РѕРґРёРјРѕ СЃРЅРѕРІР° РІС‹РїРѕР»РЅРёС‚СЊ login РґР»СЏ РїРѕР»СѓС‡РµРЅРёСЏ РЅРѕРІС‹С… С‚РѕРєРµРЅРѕРІ.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            examples:
              example1:
                summary: РџСЂРёРјРµСЂ logout
                value:
                  refresh_token: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: РЈСЃРїРµС€РЅС‹Р№ РІС‹С…РѕРґ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              examples:
                example1:
                  value:
                    status: "logged out"
        '500':
