        - AI Settings
      summary: РџРѕР»СѓС‡РёС‚СЊ РЅР°СЃС‚СЂРѕР№РєРё AI
      description: |
        Р’РѕР·РІСЂР°С‰Р°РµС‚ РїРµСЂСЃРѕРЅР°Р»СЊРЅС‹Рµ РЅР°СЃС‚СЂРѕР№РєРё AI РґР»СЏ С‚РµРєСѓС‰РµРіРѕ РїРѕР»СЊР·РѕРІР°С‚РµР»СЏ.
        Р•СЃР»Рё РЅР°СЃС‚СЂРѕР№РєРё РЅРµ СѓСЃС‚Р°РЅРѕРІР»РµРЅС‹, РІРѕР·РІСЂР°С‰Р°РµС‚ РїСѓСЃС‚РѕР№ `words_for_prompt`.
      operationId: getAISettings
