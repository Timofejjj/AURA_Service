          example: "РЇ СЂР°Р±РѕС‚Р°СЋ РїСЂРѕРіСЂР°РјРјРёСЃС‚РѕРј, РІРµРґСѓ Р°РєС‚РёРІРЅС‹Р№ РѕР±СЂР°Р· Р¶РёР·РЅРё. Р’ РѕС‚С‡С‘С‚Р°С… С…РѕС‡Сѓ РІРёРґРµС‚СЊ Р°РєС†РµРЅС‚ РЅР° РїСЂРѕРґСѓРєС‚РёРІРЅРѕСЃС‚Рё Рё Р±Р°Р»Р°РЅСЃРµ work-life."
