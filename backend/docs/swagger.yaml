        - Auth
      summary: Р’С…РѕРґ РІ СЃРёСЃС‚РµРјСѓ
      description: |
        РђСѓС‚РµРЅС‚РёС„РёС†РёСЂСѓРµС‚ РїРѕР»СЊР·РѕРІР°С‚РµР»СЏ Рё РІРѕР·РІСЂР°С‰Р°РµС‚ РїР°СЂСѓ С‚РѕРєРµРЅРѕРІ:
        - **access_token**: РёСЃРїРѕР»СЊР·СѓРµС‚СЃСЏ РґР»СЏ РґРѕСЃС‚СѓРїР° Рє Р·Р°С‰РёС‰С‘РЅРЅС‹Рј СЌРЅРґРїРѕРёРЅС‚Р°Рј (15 РјРёРЅСѓС‚)
        - **refresh_token**: РёСЃРїРѕР»СЊР·СѓРµС‚СЃСЏ РґР»СЏ РѕР±РЅРѕРІР»РµРЅРёСЏ access_token (7 РґРЅРµР№)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example1:
                summary: РџСЂРёРјРµСЂ Р»РѕРіРёРЅР°
                value:
                  email: "john@example.com"
                  password: "SecurePass123!"
      responses:
        '200':
          description: РЈСЃРїРµС€РЅР°СЏ Р°СѓС‚РµРЅС‚РёС„РёРєР°С†РёСЏ
