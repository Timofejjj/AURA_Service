<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid Glass Nav Bar — Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <nav class="nav-pill" role="navigation" aria-label="Bottom navigation">
    <div class="nav-pill__noise" aria-hidden="true"></div>
    <div class="nav-pill__reflection nav-pill__reflection--broad" aria-hidden="true"></div>
    <div class="nav-pill__reflection nav-pill__reflection--sheen" aria-hidden="true"></div>
    <div class="nav-pill__reflection nav-pill__reflection--micro" id="micro-reflection" aria-hidden="true"></div>
    <div class="nav-pill__inner">
      <div class="nav-pill__buttons">
        <button type="button" class="nav-btn nav-btn--active" aria-current="page" aria-label="Home" data-index="0">
          <span class="nav-btn__glass"></span>
          <span class="nav-btn__highlight"></span>
          <span class="nav-btn__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
        </button>
        <button type="button" class="nav-btn" aria-label="Archive" data-index="1">
          <span class="nav-btn__glass"></span>
          <span class="nav-btn__highlight"></span>
          <span class="nav-btn__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          </span>
        </button>
        <button type="button" class="nav-btn" aria-label="Reports" data-index="2">
          <span class="nav-btn__glass"></span>
          <span class="nav-btn__highlight"></span>
          <span class="nav-btn__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/></svg>
          </span>
        </button>
        <button type="button" class="nav-btn" aria-label="Profile" data-index="3">
          <span class="nav-btn__glass"></span>
          <span class="nav-btn__highlight"></span>
          <span class="nav-btn__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
        </button>
      </div>
    </div>
  </nav>

  <script src="script.js"></script>
</body>
</html>
