<!DOCTYPE html>
<html>
<head>
    <title>Test Create Report</title>
</head>
<body>
    <h1>Test Create Report API</h1>
    <button onclick="testCreateReport()">Create Report</button>
    <pre id="output"></pre>
    
    <script>
        async function testCreateReport() {
            const output = document.getElementById('output');
            
            try {
                // Получаем токен из localStorage (если есть)
                const token = localStorage.getItem('authToken');
                
                if (!token) {
                    output.textContent = 'ERROR: No auth token found. Please login first.';
                    return;
                }
                
                output.textContent = 'Sending request...\n';
                output.textContent += 'Token: ' + token.substring(0, 20) + '...\n\n';
                
                const response = await fetch('http://localhost:8080/api/reports', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        date_from: '2026-01-01',
                        date_to: '2026-01-31'
                    })
                });
                
                output.textContent += 'Status: ' + response.status + '\n\n';
                
                const data = await response.json();
                output.textContent += 'Response:\n';
                output.textContent += JSON.stringify(data, null, 2);
                
            } catch (error) {
                output.textContent += 'ERROR: ' + error.message;
            }
        }
    </script>
</body>
</html>
